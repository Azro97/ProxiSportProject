name: iOS Build

# Builds the app for the iOS Simulator on a macOS runner. This is a Debug,
# unsigned build (CODE_SIGNING_ALLOWED=NO) so it needs no Apple Developer
# account, certificates, or provisioning profiles - it only proves the
# native iOS project and all pods still compile. A signed device/App Store
# build is a separate, later step once there's a Developer account and
# signing secrets to work with.

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "patches/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Write .env
        # Falls back to placeholder values so the build succeeds even
        # without SUPABASE_URL/SUPABASE_ANON_KEY secrets configured - this
        # job only checks that the app compiles, not that it talks to a
        # real Supabase project.
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'placeholder-anon-key' }}" >> .env

      - name: Select an Xcode version compatible with RN 0.76
        # RN 0.76 predates the newest Xcode/Clang toolchains. A transitive
        # C++ dependency (fmt, pulled in via React Native's core) uses a
        # consteval format-string check that newer, stricter Clang versions
        # reject ("call to consteval function ... is not a constant
        # expression"). macos-latest runners ship several Xcode versions
        # side by side under /Applications - pick the oldest one available
        # rather than hardcoding a version number that may not exist on a
        # given runner image.
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app
          OLDEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | head -n1)
          if [ -z "$OLDEST" ]; then
            OLDEST="/Applications/Xcode.app"
          fi
          echo "Selecting: $OLDEST"
          sudo xcode-select -s "$OLDEST/Contents/Developer"
          xcodebuild -version

      - name: Ensure an iOS Simulator runtime is installed
        # GitHub's macOS runner images fully provision simulator runtimes
        # only for the default (newest) Xcode; the older side-by-side
        # installs we deliberately switched to above can have none at all
        # ("iOS 26.0 is not installed" with zero eligible destinations).
        # Explicitly download/install the platform for whichever Xcode is
        # now selected rather than assume one is already present.
        run: |
          xcodebuild -downloadPlatform iOS
          xcrun simctl list runtimes

      - name: Install CocoaPods dependencies
        working-directory: ios
        # maplibre-react-native wraps the MapLibre Native SDK, which is
        # distributed as an XCFramework that doesn't support static-library
        # linkage ("Module 'MapLibre' not found" otherwise). The Podfile
        # already calls use_frameworks! when USE_FRAMEWORKS is set.
        env:
          USE_FRAMEWORKS: static
        run: pod install

      - name: Pick an available iOS Simulator destination
        working-directory: ios
        # Unlike watchOS Simulator, iOS Simulator has no generic "Any iOS
        # Simulator Device" placeholder destination - this has been an open
        # gap since Xcode 14 (see developer.apple.com/forums/thread/716700).
        # -sdk iphonesimulator alone and 'generic/platform=iOS Simulator'
        # both failed here for the same reason. The robust fix is to ask
        # the scheme itself what's actually installed on this runner and
        # target a concrete device by id, rather than guess a name that
        # may not exist on a given Xcode/runner image.
        #
        # Real destination lines look like:
        #   { platform:iOS Simulator, arch:arm64, id:XXXX-..., OS:26.0.1, name:iPhone 17 }
        # The placeholder line ("Any iOS Simulator Device") has no OS field
        # and a non-hex id, so filtering for a line with both "platform:iOS
        # Simulator" and "OS:" reliably skips it and lands on a real device.
        run: |
          xcodebuild -showdestinations -workspace PP.xcworkspace -scheme PP -configuration Debug 2>&1 | tee destinations.txt
          SIM_LINE=$(grep 'platform:iOS Simulator' destinations.txt | grep 'OS:' | head -n1)
          SIM_ID=$(echo "$SIM_LINE" | sed -E 's/.*id:([0-9A-Fa-f-]+),.*/\1/')
          if [ -z "$SIM_ID" ]; then
            echo "No iOS Simulator destination found on this runner"
            exit 1
          fi
          echo "Selected simulator id: $SIM_ID"
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"

      - name: Build for iOS Simulator
        working-directory: ios
        run: |
          xcodebuild build \
            -workspace PP.xcworkspace \
            -scheme PP \
            -configuration Debug \
            -destination "id=$SIM_ID" \
            CODE_SIGNING_ALLOWED=NO
